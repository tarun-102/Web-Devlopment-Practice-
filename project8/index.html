<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="slider-container">

    <div class="slider" id="slider">
        <img src="https://a-z-animals.com/media/tiger_laying_hero_background.jpg">
        
        <img src="https://i.ytimg.com/vi/3Fy668pn5ZQ/sddefault.jpg">
        
        <img src="	https://cdn.pixabay.com/photo/2025/06/05/12/25/turtle-9642956_1280.jpg">
        
        <img src="https://wowslider.com/sliders/demo-18/data1/images/shanghai.jpg">

    </div>

</div>

<div class="slide-btn-contain">
    <button onclick="prevSlide()"><</button>
    <button onclick="playSlide()">Start</button>
    <button onclick="stopSlide()">Stop</button>
     <button onclick="nextSlide()">></button>
</div>

<script src="app.js"></script>
</body>
</html>
