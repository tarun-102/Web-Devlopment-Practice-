<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
</head>
<body>
   
    <div class="product-form">
        <form>
           <div class="form-container">
             <div class="input-group">
                <label for="productname">Product Name</label>
            <input type="text"
                placeholder="Enter a product Name"
            pname="productname" id="productname">
            </div>

             <div class="input-group">
                <label for="productname">Product Description</label>
            <textarea name="description" placeholder="Enter Product Description" id="description"></textarea>
            </div>

             <div class="input-group">
                <label for="productname">Product Price</label>
            <input type="text" name="price"  placeholder ="Enter Product" id="price">
            </div>

             <div class="input-group">
                <label for="imgurl">Product Image URL</label>
            <input type="text" name="imgurl" id="imgurl" placeholder="Enter Product image URL ">
            
            </div>
            <button id="submitbtn" type="submit">Add Product Card</button>
           </div>
            
        </form>
        
    </div>

     <h1 style="margin-top: 1rem;">Product List</h1>
    <div class="product-container">
      



        <!-- card 2 -->

         <div class="product-card" id="2">
            <div class="product-img">
                <img src="https://png.pngtree.com/png-clipart/20241215/original/pngtree-samsung-s25-ultra-pro-mobile-phone-png-image_17883915.png" class="pimg" alt="">
            </div> 
            <div class="product-details">
                <h3 class="p-name">Samsung S26 Ultra</h3>
            <p class="p-description">this is one of the best phone in the world not for the you this is for the both</p>
            <h3 class="p-price">₹ 3,20,000</h3>
            </div>
           <div>
             <button class="btn edit btn-outline-success">Edit</button>
            <button class="btn delete btn-outline-danger">Delete</button>
           </div>
        </div>

    </div>
</body>
<script src="app.js"></script>
</html>
